<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOAP JSON Parser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root[data-theme="dark"] {
    --bg:        #0d0f14;
    --surface:   #13161e;
    --surface2:  #1a1d28;
    --border:    #252836;
    --text:      #e2e4ed;
    --muted:     #6b7280;
    --accent:    #00e5b0;
    --accent2:   #7c6af7;
    --danger:    #ff5e6a;
    --warn:      #ffb547;
    --line-num:  #3a3f52;
    --editor-bg: #0a0c10;
    --code-fg:   #abb2bf;
    --glow:      rgba(0,229,176,0.15);
    --glow2:     rgba(124,106,247,0.12);
    --scrollbar: #252836;
    --scrollbar-thumb: #3a3f52;
    --badge-bg:  #1e2235;
    --badge-text:#8b92ad;
  }
  :root[data-theme="light"] {
    --bg:        #f0f2f7;
    --surface:   #ffffff;
    --surface2:  #f7f8fc;
    --border:    #dde1ee;
    --text:      #1a1d2e;
    --muted:     #7a829a;
    --accent:    #00a67e;
    --accent2:   #5b4fd4;
    --danger:    #d63040;
    --warn:      #e08c00;
    --line-num:  #c8cedf;
    --editor-bg: #f9fafc;
    --code-fg:   #383c4a;
    --glow:      rgba(0,166,126,0.08);
    --glow2:     rgba(91,79,212,0.08);
    --scrollbar: #e2e6f0;
    --scrollbar-thumb: #c0c7d8;
    --badge-bg:  #eef0f8;
    --badge-text:#6b7490;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html { height: 100%; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    min-height: 100vh;
    padding: 0;
    transition: background 0.3s ease, color 0.3s ease;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--scrollbar); border-radius: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* Fonts */
  code, pre, textarea, .mono { font-family: 'JetBrains Mono', monospace; }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .logo-version {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    background: var(--badge-bg);
    padding: 2px 7px;
    border-radius: 100px;
    border: 1px solid var(--border);
  }

  .header-actions { display: flex; align-items: center; gap: 8px; }

  /* Theme toggle */
  .theme-toggle {
    width: 40px; height: 22px;
    background: var(--border);
    border-radius: 11px;
    border: none;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    outline: none;
  }
  .theme-toggle::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    background: var(--text);
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.25s cubic-bezier(.4,0,.2,1), background 0.2s;
  }
  [data-theme="light"] .theme-toggle::after {
    transform: translateX(18px);
    background: var(--accent2);
  }

  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 15px;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--accent); background: var(--surface); }

  /* Main layout */
  .main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px 24px 48px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Info bar */
  .info-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--badge-text);
    background: var(--badge-bg);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 100px;
  }
  .badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  /* Editor panels */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 820px) {
    .panels { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: background 0.3s, border-color 0.3s;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    gap: 8px;
    min-height: 42px;
  }

  .panel-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .panel-title .indicator {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }
  .panel-title .indicator.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .panel-title .indicator.error { background: var(--danger); box-shadow: 0 0 6px var(--danger); }

  .panel-actions { display: flex; gap: 6px; align-items: center; }

  .pill-btn {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pill-btn:hover { color: var(--text); border-color: var(--muted); background: var(--surface); }
  .pill-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .pill-btn:disabled:hover { color: var(--muted); border-color: var(--border); background: transparent; }

  /* Character count */
  .char-count {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    padding: 0 4px;
  }

  /* Textarea */
  .editor-wrap {
    position: relative;
    flex: 1;
    min-height: 320px;
  }

  textarea {
    width: 100%;
    height: 100%;
    min-height: 320px;
    padding: 16px;
    background: var(--editor-bg);
    color: var(--code-fg);
    border: none;
    outline: none;
    resize: none;
    font-size: 12.5px;
    line-height: 1.7;
    tab-size: 2;
    transition: background 0.3s;
  }

  textarea::placeholder { color: var(--line-num); }

  /* Output pre */
  .output-wrap {
    flex: 1;
    position: relative;
    min-height: 320px;
    overflow: hidden;
  }

  pre#output {
    margin: 0;
    padding: 16px;
    background: var(--editor-bg);
    color: var(--code-fg);
    font-size: 12.5px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow: auto;
    height: 100%;
    min-height: 320px;
    max-height: 600px;
    transition: background 0.3s;
  }

  /* Empty state */
  .empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--line-num);
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .empty-state svg { opacity: 0.4; }
  .empty-state span { font-size: 12px; font-family: 'JetBrains Mono', monospace; }

  /* Convert button */
  .convert-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .convert-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 0 0 var(--glow);
    position: relative;
    overflow: hidden;
  }
  .convert-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.15s;
  }
  .convert-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--glow), 0 2px 8px var(--glow2); }
  .convert-btn:hover::before { background: rgba(255,255,255,0.06); }
  .convert-btn:active { transform: translateY(0); }

  .convert-btn .kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    opacity: 0.7;
    background: rgba(255,255,255,0.15);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .secondary-btns { display: flex; gap: 8px; flex-wrap: wrap; }

  .sec-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sec-btn:hover { border-color: var(--accent2); background: var(--surface2); }
  .sec-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .sec-btn:disabled:hover { border-color: var(--border); background: var(--surface); }

  /* Status / error */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    min-height: 20px;
  }
  .status-bar.error-state { color: var(--danger); }
  .status-bar.success-state { color: var(--accent); }
  .status-bar .status-icon { font-size: 14px; }

  /* Syntax highlight colors */
  .tok-key    { color: #7c6af7; }
  .tok-str    { color: #98c379; }
  .tok-num    { color: #d19a66; }
  .tok-bool   { color: #56b6c2; }
  .tok-null   { color: #e06c75; }
  [data-theme="light"] .tok-key  { color: #5b4fd4; }
  [data-theme="light"] .tok-str  { color: #2e7d32; }
  [data-theme="light"] .tok-num  { color: #a05c00; }
  [data-theme="light"] .tok-bool { color: #0077aa; }
  [data-theme="light"] .tok-null { color: #c62828; }

  /* Notification toast */
  #toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    padding: 12px 18px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    transform: translateY(12px);
    opacity: 0;
    transition: all 0.25s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
    z-index: 999;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { background: #1a3a2e; border: 1px solid var(--accent); color: var(--accent); }
  #toast.error-t  { background: #3a1a1e; border: 1px solid var(--danger); color: var(--danger); }

  /* Resize handle */
  .resize-handle {
    height: 4px;
    cursor: ns-resize;
    background: transparent;
    transition: background 0.15s;
  }
  .resize-handle:hover { background: var(--accent); opacity: 0.4; }

  /* Animate in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .panel { animation: fadeUp 0.35s cubic-bezier(.4,0,.2,1) both; }
  .panel:nth-child(2) { animation-delay: 0.06s; }
  .convert-bar { animation: fadeUp 0.35s cubic-bezier(.4,0,.2,1) 0.12s both; }

  /* Divider arrow */
  .arrow-divider {
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 18px;
  }
  @media (min-width: 821px) {
    .arrow-divider { display: flex; }
    .panels { align-items: stretch; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">{}</div>
      <span class="logo-text">SOAP Parser</span>
      <span class="logo-version">v2.0</span>
    </div>
    <div class="header-actions">
      <span style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-right:4px;" id="themeLabel">DARK</span>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark/light theme"></button>
    </div>
  </div>
</header>

<!-- Main -->
<main class="main">

  <!-- Info badges -->
  <div class="info-bar">
    <span class="badge"><span class="dot" style="background:#00e5b0"></span>Recursive deep-parse</span>
    <span class="badge"><span class="dot" style="background:#7c6af7"></span>Nested JSON unwrap</span>
    <span class="badge"><span class="dot" style="background:#ffb547"></span>SOAP .d envelope support</span>
    <span class="badge" style="margin-left:auto;">
      <span style="color:var(--muted)">Ctrl/Cmd</span>&nbsp;+&nbsp;<span style="color:var(--accent)">Enter</span>&nbsp;to convert
    </span>
  </div>

  <!-- Editor panels -->
  <div class="panels">

    <!-- Input panel -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <span class="indicator" id="inputIndicator"></span>
          INPUT
        </div>
        <div class="panel-actions">
          <span class="char-count" id="charCount">0 chars</span>
          <button class="pill-btn" onclick="formatInput()" title="Prettify JSON">Format</button>
          <button class="pill-btn" onclick="clearInput()" title="Clear input">Clear</button>
          <button class="pill-btn" id="pasteBtn" onclick="pasteFromClipboard()" title="Paste from clipboard">Paste</button>
        </div>
      </div>
      <div class="editor-wrap">
        <textarea id="input"
          placeholder='Paste SOAP/JSON response here…&#10;&#10;Supports:&#10;  • Raw JSON objects or arrays&#10;  • SOAP {"d":"…"} envelopes&#10;  • Nested stringified JSON at any depth'
          oninput="onInputChange()"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
        ></textarea>
      </div>
    </div>

    <!-- Output panel -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <span class="indicator" id="outputIndicator"></span>
          OUTPUT
        </div>
        <div class="panel-actions">
          <span class="char-count" id="outputCharCount"></span>
          <button class="pill-btn" id="copyBtn" onclick="copyOutput()" disabled title="Copy parsed JSON">Copy</button>
          <button class="pill-btn" id="downloadBtn" onclick="downloadOutput()" disabled title="Download as .json">Download</button>
          <button class="pill-btn" onclick="clearOutput()" title="Clear output">Clear</button>
        </div>
      </div>
      <div class="output-wrap">
        <div class="empty-state" id="emptyState">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          <span>No output yet — hit Convert</span>
        </div>
        <pre id="output" aria-live="polite"></pre>
      </div>
    </div>

  </div>

  <!-- Action bar -->
  <div class="convert-bar">
    <button class="convert-btn" onclick="convert()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      Convert
      <span class="kbd">⌘↵</span>
    </button>
    <div class="secondary-btns">
      <button class="sec-btn" onclick="formatInput()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
        Format Input
      </button>
      <button class="sec-btn" id="copyBtnMain" onclick="copyOutput()" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy JSON
      </button>
      <button class="sec-btn" onclick="clearAll()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Clear All
      </button>
    </div>
    <div class="status-bar" id="statusBar" style="margin-left:auto;"></div>
  </div>

</main>

<!-- Toast -->
<div id="toast"></div>

<script>
// ─── Deep Parser ──────────────────────────────────────────────────
function deepParse(value) {
  if (typeof value === "string") {
    const t = value.trim();
    if ((t.startsWith("{") && t.endsWith("}")) || (t.startsWith("[") && t.endsWith("]"))) {
      try { return deepParse(JSON.parse(t)); } catch { return value; }
    }
    return value;
  }
  if (Array.isArray(value)) return value.map(deepParse);
  if (value !== null && typeof value === "object") {
    const r = {};
    for (const k in value) r[k] = deepParse(value[k]);
    return r;
  }
  return value;
}

// ─── Syntax Highlight ─────────────────────────────────────────────
function highlight(json) {
  return json
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(
      /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g,
      match => {
        let cls = 'tok-num';
        if (/^"/.test(match)) {
          cls = /:$/.test(match) ? 'tok-key' : 'tok-str';
        } else if (/true|false/.test(match)) {
          cls = 'tok-bool';
        } else if (/null/.test(match)) {
          cls = 'tok-null';
        }
        return `<span class="${cls}">${match}</span>`;
      }
    );
}

// ─── State ────────────────────────────────────────────────────────
let lastParsed = null;

function convert() {
  const input = document.getElementById("input").value.trim();
  const outputEl = document.getElementById("output");
  const emptyState = document.getElementById("emptyState");
  const statusBar = document.getElementById("statusBar");

  outputEl.innerHTML = "";
  lastParsed = null;
  setOutputButtons(false);
  setOutputIndicator('idle');

  if (!input) {
    setStatus('', 'idle');
    emptyState.style.opacity = '1';
    return;
  }

  emptyState.style.opacity = '0';

  try {
    let outer = JSON.parse(input);
    let data = (outer.d && typeof outer.d === "string") ? JSON.parse(outer.d) : outer;
    const parsed = deepParse(data);
    const pretty = JSON.stringify(parsed, null, 2);
    lastParsed = pretty;
    outputEl.innerHTML = highlight(pretty);
    setOutputButtons(true);
    setOutputIndicator('success');
    document.getElementById("outputCharCount").textContent = formatNum(pretty.length) + ' chars';
    const keys = countKeys(parsed);
    setStatus(`✓ Parsed — ${formatNum(pretty.length)} chars · ${keys} keys`, 'success');
  } catch (e) {
    setOutputIndicator('error');
    emptyState.style.opacity = '1';
    setStatus(`✗ ${e.message}`, 'error');
  }
}

function countKeys(obj, count = 0) {
  if (obj !== null && typeof obj === 'object') {
    const keys = Object.keys(obj);
    count += keys.length;
    for (const k of keys) count = countKeys(obj[k], count);
  } else if (Array.isArray(obj)) {
    for (const item of obj) count = countKeys(item, count);
  }
  return count;
}

function formatNum(n) {
  return n.toLocaleString();
}

// ─── Status & Indicators ──────────────────────────────────────────
function setStatus(msg, type) {
  const el = document.getElementById("statusBar");
  el.textContent = msg;
  el.className = 'status-bar' + (type === 'error' ? ' error-state' : type === 'success' ? ' success-state' : '');
}

function setOutputIndicator(state) {
  const ind = document.getElementById("outputIndicator");
  ind.className = 'indicator' + (state === 'success' ? ' active' : state === 'error' ? ' error' : '');
}

function setOutputButtons(enabled) {
  ['copyBtn','copyBtnMain','downloadBtn'].forEach(id => {
    document.getElementById(id).disabled = !enabled;
  });
}

// ─── Input events ─────────────────────────────────────────────────
function onInputChange() {
  const len = document.getElementById("input").value.length;
  document.getElementById("charCount").textContent = formatNum(len) + ' chars';
  const ind = document.getElementById("inputIndicator");
  ind.className = 'indicator' + (len > 0 ? ' active' : '');
  // Clear status if input changes
  setStatus('', 'idle');
}

// ─── Format Input ─────────────────────────────────────────────────
function formatInput() {
  const el = document.getElementById("input");
  try {
    el.value = JSON.stringify(JSON.parse(el.value), null, 2);
    onInputChange();
    showToast('Input formatted', 'success');
  } catch {
    showToast('Not valid JSON', 'error');
  }
}

// ─── Clear ────────────────────────────────────────────────────────
function clearInput() {
  document.getElementById("input").value = "";
  onInputChange();
  setStatus('', 'idle');
  document.getElementById("inputIndicator").className = 'indicator';
}

function clearOutput() {
  document.getElementById("output").innerHTML = "";
  document.getElementById("emptyState").style.opacity = '1';
  document.getElementById("outputCharCount").textContent = '';
  setOutputButtons(false);
  setOutputIndicator('idle');
  lastParsed = null;
}

function clearAll() {
  clearInput();
  clearOutput();
  setStatus('', 'idle');
}

// ─── Copy ─────────────────────────────────────────────────────────
function copyOutput() {
  if (!lastParsed) return;
  navigator.clipboard.writeText(lastParsed)
    .then(() => showToast('Copied to clipboard!', 'success'))
    .catch(() => showToast('Copy failed', 'error'));
}

// ─── Download ─────────────────────────────────────────────────────
function downloadOutput() {
  if (!lastParsed) return;
  const blob = new Blob([lastParsed], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'parsed-output.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Downloaded!', 'success');
}

// ─── Paste ────────────────────────────────────────────────────────
async function pasteFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById("input").value = text;
    onInputChange();
    showToast('Pasted from clipboard', 'success');
  } catch {
    showToast('Clipboard access denied', 'error');
  }
}

// ─── Theme ────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeLabel').textContent = isDark ? 'LIGHT' : 'DARK';
  localStorage.setItem('soap-theme', isDark ? 'light' : 'dark');
}

// Load saved theme
(function() {
  const saved = localStorage.getItem('soap-theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('themeLabel').textContent = saved.toUpperCase();
  }
})();

// ─── Toast ────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = (type === 'success' ? '✓ ' : '✗ ') + msg;
  el.className = 'show ' + (type === 'success' ? 'success' : 'error-t');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2200);
}

// ─── Keyboard ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); convert(); }
});
</script>
