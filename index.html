<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamic SOAP JSON Parser</title>
<style>
  :root {
    --bg: #f4f6f8;
    --surface: #ffffff;
    --text: #1d2433;
    --muted: #64748b;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --danger: #dc2626;
  }
  * { box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: var(--bg);
    color: var(--text);
  }
  .container {
    max-width: 1000px;
    margin: 0 auto;
    background: var(--surface);
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    padding: 24px;
  }
  h2 { margin: 0 0 8px; }
  .subtitle { margin: 0 0 20px; color: var(--muted); }
  .section-title { margin: 0 0 8px; font-size: 14px; font-weight: 700; }
  .hint { margin: 0 0 8px; color: var(--muted); font-size: 13px; }
  textarea {
    width: 100%;
    height: 220px;
    font-family: monospace;
    padding: 12px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    resize: vertical;
  }
  textarea:focus {
    outline: 2px solid rgba(37, 99, 235, 0.25);
    border-color: var(--primary);
  }
  .actions { margin: 12px 0 4px; display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    border: 0;
    border-radius: 8px;
    padding: 10px 14px;
    cursor: pointer;
    font-weight: 600;
    background: #e2e8f0;
    color: #0f172a;
  }
  button.primary { background: var(--primary); color: #fff; }
  button.primary:hover { background: var(--primary-hover); }
  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .meta { color: var(--muted); font-size: 12px; margin-top: 6px; }
  pre {
    margin-top: 10px;
    background: #1e1e1e;
    color: #dcdcdc;
    padding: 15px;
    overflow: auto;
    max-height: 500px;
    min-height: 150px;
    white-space: pre-wrap;
    word-wrap: break-word;
    border-radius: 8px;
  }
  .error { color: var(--danger); margin-top: 10px; min-height: 20px; }
  #notification {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #4caf50;
    color: white;
    padding: 12px 20px;
    border-radius: 5px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 1000;
  }
  #notification.show {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="container">
  <h2>Dynamic SOAP JSON Parser</h2>
  <p class="subtitle">Paste a SOAP response and convert nested stringified JSON instantly.</p>

  <p class="section-title">Input</p>
  <p class="hint">Tip: Press <strong>Ctrl/Cmd + Enter</strong> to convert quickly.</p>
  <textarea id="input" placeholder="Paste SOAP response here..." oninput="updateInputMeta()"></textarea>
  <div id="inputMeta" class="meta">0 characters</div>

  <div class="actions">
    <button class="primary" onclick="convert()">Convert</button>
    <button onclick="formatInput()">Format Input</button>
    <button id="copyBtn" onclick="copyOutput()" disabled>Copy JSON</button>
    <button onclick="clearAll()">Clear</button>
  </div>

  <p class="section-title" style="margin-top: 16px;">Output</p>
  <div id="outputMeta" class="meta">No parsed output yet.</div>
  <pre id="output"></pre>
  <div class="error" id="error" role="alert" aria-live="polite"></div>
</div>

<div id="notification">Copied to clipboard!</div>

<script>
// Recursive deep parser
function deepParse(value) {
  if (typeof value === "string") {
    const trimmed = value.trim();
    if ((trimmed.startsWith("{") && trimmed.endsWith("}")) ||
        (trimmed.startsWith("[") && trimmed.endsWith("]"))) {
      try { return deepParse(JSON.parse(trimmed)); } catch { return value; }
    }
    return value;
  }
  if (Array.isArray(value)) return value.map(deepParse);
  if (value !== null && typeof value === "object") {
    const result = {};
    for (const key in value) result[key] = deepParse(value[key]);
    return result;
  }
  return value;
}

// Convert SOAP response to parsed JSON
function convert() {
  const input = document.getElementById("input").value;
  const output = document.getElementById("output");
  const error = document.getElementById("error");
  const copyBtn = document.getElementById("copyBtn");

  output.textContent = "";
  error.textContent = "";
  copyBtn.disabled = true;

  try {
    let outer = JSON.parse(input);
    let data = outer.d && typeof outer.d === "string" ? JSON.parse(outer.d) : outer;
    const parsed = deepParse(data);
    const pretty = JSON.stringify(parsed, null, 2);
    output.textContent = pretty;
    copyBtn.disabled = false;
    document.getElementById("outputMeta").textContent = `Parsed ${pretty.length} characters of JSON output.`;
  } catch (e) {
    error.textContent = "Parsing error: " + e.message;
    document.getElementById("outputMeta").textContent = "No parsed output yet.";
  }
}

function formatInput() {
  const inputEl = document.getElementById("input");
  const error = document.getElementById("error");
  error.textContent = "";

  try {
    const parsed = JSON.parse(inputEl.value);
    inputEl.value = JSON.stringify(parsed, null, 2);
    updateInputMeta();
  } catch (e) {
    error.textContent = "Input is not valid JSON to format.";
  }
}

function clearAll() {
  document.getElementById("input").value = "";
  document.getElementById("output").textContent = "";
  document.getElementById("error").textContent = "";
  document.getElementById("copyBtn").disabled = true;
  document.getElementById("outputMeta").textContent = "No parsed output yet.";
  updateInputMeta();
}

function updateInputMeta() {
  const length = document.getElementById("input").value.length;
  document.getElementById("inputMeta").textContent = `${length} characters`;
}

// Copy JSON to clipboard with friendly notification
function copyOutput() {
  const output = document.getElementById("output").textContent;
  if (!output) return;
  navigator.clipboard.writeText(output).then(() => {
    const notification = document.getElementById("notification");
    notification.classList.add("show");
    // Hide after 2 seconds
    setTimeout(() => notification.classList.remove("show"), 2000);
  }).catch(() => {
    const notification = document.getElementById("notification");
    notification.textContent = "Failed to copy!";
    notification.style.background = "#f44336"; // red
    notification.classList.add("show");
    setTimeout(() => {
      notification.classList.remove("show");
      notification.style.background = "#4caf50";
      notification.textContent = "Copied to clipboard!";
    }, 2000);
  });
}

document.getElementById("input").addEventListener("keydown", (event) => {
  if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
    convert();
  }
});
</script>

</body>
</html>
